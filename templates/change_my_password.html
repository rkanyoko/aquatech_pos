{% extends "base.html" %}

{% block title %}Change my password{% endblock %}

{% block content %}
    <style>
        h1 { color: var(--text-main); }
        form {
            max-width: 420px;
            background: #fff;
            padding: 1.5rem;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(15, 52, 96, 0.08);
        }
        label { display: block; margin-top: 0.75rem; font-weight: 500; }
        input[type=password] {
            width: 100%;
            padding: 8px;
            margin-top: 4px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            box-sizing: border-box;
        }
        .hint { font-size: 0.85rem; color: #516071; margin-top: 0.5rem; }
    </style>

    <h1>Change my password</h1>
    <p class="hint">You must enter your current password. New password must be at least 8 characters.</p>

    <form method="post">
        <label for="current_password">Current password</label>
        <input type="password" id="current_password" name="current_password" required autocomplete="current-password">

        <label for="new_password">New password</label>
        <input type="password" id="new_password" name="new_password" required minlength="8" autocomplete="new-password">

        <label for="confirm_password">Confirm new password</label>
        <input type="password" id="confirm_password" name="confirm_password" required minlength="8" autocomplete="new-password">

        <p style="margin-top: 1.25rem;">
            <button type="submit" class="btn-primary">Update password</button>
            <a href="{{ url_for('dashboard') }}" style="margin-left: 10px;">Cancel</a>
        </p>
    </form>
{% endblock %}
