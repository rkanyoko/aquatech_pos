{% extends "base.html" %}

{% block title %}Reset password — {{ target.username }}{% endblock %}

{% block content %}
    <style>
        h1 { color: var(--text-main); }
        form {
            max-width: 420px;
            background: #fff;
            padding: 1.5rem;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(15, 52, 96, 0.08);
        }
        label { display: block; margin-top: 0.75rem; font-weight: 500; }
        input[type=password] {
            width: 100%;
            padding: 8px;
            margin-top: 4px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            box-sizing: border-box;
        }
        .meta { color: #516071; margin-bottom: 1rem; }
    </style>

    <h1>Set new password</h1>
    <p class="meta">User: <strong>{{ target.username }}</strong> ({{ target.role }})</p>
    <p class="meta">The user will use this new password on next login. Minimum 8 characters.</p>

    <form method="post">
        <label for="new_password">New password</label>
        <input type="password" id="new_password" name="new_password" required minlength="8" autocomplete="new-password">

        <label for="confirm_password">Confirm new password</label>
        <input type="password" id="confirm_password" name="confirm_password" required minlength="8" autocomplete="new-password">

        <p style="margin-top: 1.25rem;">
            <button type="submit" class="btn-primary">Save</button>
            <a href="{{ url_for('manage_users') }}" style="margin-left: 10px;">Cancel</a>
        </p>
    </form>
{% endblock %}
