{% extends "base.html" %}

{% block title %}Restock Product{% endblock %}

{% block content %}
    <style>
        h1 { color: #333; }
        form {
            background-color: #f9f9f9;
            padding: 20px;
            border-radius: 5px;
            border: 1px solid #ddd;
            max-width: 500px;
            margin: 0 auto;
        }
        input[type=number] {
            width: 100%;
            padding: 8px;
            margin: 6px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        input[type=submit] {
            background-color: #28a745;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>

    <h1>Restock: {{ product.name }} (Current: {{ product.quantity }})</h1>

    <form method="post">
        <label for="amount">Amount to add:</label>
        <input type="number" id="amount" name="amount" min="1" required>

        <input type="submit" value="Restock">
    </form>
{% endblock %}
